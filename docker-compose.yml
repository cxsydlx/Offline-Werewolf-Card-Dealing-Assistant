version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: weblangrensha-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: weblangrensha
      MYSQL_USER: werewolf
      MYSQL_PASSWORD: werewolf123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
